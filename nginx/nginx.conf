events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log no stdout para visualização via docker logs
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Define o upstream (endereço interno do container da API)
    upstream api_backend {
        server api:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Frontend estático ──────────────────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── Proxy reverso para a API ───────────────────────
        # Remove o prefixo /api antes de repassar ao backend
        location ~ ^/api(/?)(.*)$ {
            rewrite ^/api/(.*)$ /$1 break;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            # Cabeçalhos para o backend saber o IP real do cliente
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}
