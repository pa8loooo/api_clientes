services:

  # ── Banco de Dados ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE:      clientesdb
      MYSQL_USER:          appuser
      MYSQL_PASSWORD:      apppassword
    volumes:
        - mysql_data:/var/lib/mysql
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── API Backend ─────────────────────────────────────────
  api:
    build: ./backend
    container_name: api
    restart: unless-stopped
    environment:
      DB_HOST:     mysql
      DB_PORT:     3306
      DB_USER:     appuser
      DB_PASSWORD: apppassword
      DB_NAME:     clientesdb
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_net
    # Porta exposta apenas para testes diretos (opcional)
    # ports:
    #   - "5000:5000"

  # ── Proxy Reverso + Frontend ────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  mysql_data:
