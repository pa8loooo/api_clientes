<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Clientes</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3250;
      --accent:    #5b8dee;
      --accent-h:  #4a7de0;
      --danger:    #e05b5b;
      --success:   #4caf82;
      --text:      #e8eaf6;
      --muted:     #8a8fb8;
      --radius:    10px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Layout ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -.5px;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--muted);
      margin-top: .4rem;
      font-size: .95rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: .95rem;
      padding: .6rem .9rem;
      transition: border-color .2s;
      outline: none;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); opacity: .7; }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: .7rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      padding: .6rem 1.3rem;
      transition: background .18s, transform .12s;
    }

    button:active { transform: scale(.97); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }

    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      padding: .75rem 1.2rem;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 999;
      max-width: 320px;
    }

    #toast.show { opacity: 1; }
    #toast.ok   { background: var(--success); color: #fff; }
    #toast.err  { background: var(--danger);  color: #fff; }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }

    thead th {
      text-align: left;
      padding: .65rem .9rem;
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    td {
      padding: .75rem .9rem;
      vertical-align: middle;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: .4rem;
    }

    .btn-icon {
      border-radius: 6px;
      font-size: .78rem;
      padding: .35rem .75rem;
    }

    .btn-edit   { background: #2d4a8a; color: #a0c0ff; }
    .btn-edit:hover { background: #3a5ea3; }

    .btn-del    { background: #5a2020; color: #ffaaaa; }
    .btn-del:hover { background: #7a2a2a; }

    /* ── Empty / Loading ── */
    .empty, .loading {
      text-align: center;
      color: var(--muted);
      padding: 2.5rem 1rem;
      font-size: .95rem;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-left: .5rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Badge ── */
    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: .75rem;
      color: var(--muted);
      padding: .15rem .6rem;
    }
  </style>
</head>
<body>
<div id="toast"></div>

<div class="container">
  <header>
    <h1>Cadastro de <span>Clientes</span></h1>
    <p>CRUD completo com API Python + MySQL + Docker</p>
  </header>

  <!-- ── Formulário ── -->
  <div class="card">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span id="form-title">Novo Cliente</span>
      <span id="edit-badge" class="badge" style="display:none">editando</span>
    </h2>

    <div class="form-grid">
      <div class="field">
        <label for="nome">Nome completo *</label>
        <input id="nome" type="text" placeholder="Ex.: Maria Silva" autocomplete="off" />
      </div>
      <div class="field">
        <label for="email">E-mail *</label>
        <input id="email" type="email" placeholder="maria@email.com" autocomplete="off" />
      </div>
      <div class="field full">
        <label for="telefone">Telefone</label>
        <input id="telefone" type="tel" placeholder="(11) 91234-5678" autocomplete="off" />
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="submitForm()">Salvar</button>
      <button class="btn-secondary" onclick="resetForm()">Limpar</button>
    </div>
  </div>

  <!-- ── Tabela ── -->
  <div class="card">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Clientes Cadastrados
      <span id="count-badge" class="badge" style="margin-left:auto">0</span>
    </h2>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Telefone</th>
            <th>Criado em</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" class="loading">Carregando</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  // O Nginx redireciona /api → backend, então usamos caminho relativo.
  const API = '/api';

  // ── Estado ──────────────────────────────────────────────────────────────
  let editingId = null;

  // ── Toast ───────────────────────────────────────────────────────────────
  function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 3000);
  }

  // ── Reset Form ──────────────────────────────────────────────────────────
  function resetForm() {
    editingId = null;
    document.getElementById('nome').value = '';
    document.getElementById('email').value = '';
    document.getElementById('telefone').value = '';
    document.getElementById('form-title').textContent = 'Novo Cliente';
    document.getElementById('edit-badge').style.display = 'none';
  }

  // ── Carregar lista ──────────────────────────────────────────────────────
  async function loadUsers() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '<tr><td colspan="6" class="loading">Carregando</td></tr>';

    try {
      const res  = await fetch(`${API}/users`);
      const data = await res.json();

      document.getElementById('count-badge').textContent = data.length;

      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Nenhum cliente cadastrado ainda.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(u => `
        <tr>
          <td><span class="badge">${u.id}</span></td>
          <td>${esc(u.nome)}</td>
          <td>${esc(u.email)}</td>
          <td>${esc(u.telefone || '—')}</td>
          <td>${formatDate(u.criado_em)}</td>
          <td>
            <div class="actions">
              <button class="btn-icon btn-edit" onclick="startEdit(${u.id}, '${esc(u.nome)}', '${esc(u.email)}', '${esc(u.telefone || '')}')">Editar</button>
              <button class="btn-icon btn-del"  onclick="deleteUser(${u.id}, '${esc(u.nome)}')">Excluir</button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">Erro ao conectar à API. Verifique se o backend está rodando.</td></tr>`;
      console.error(e);
    }
  }

  // ── Submit (Create ou Update) ───────────────────────────────────────────
  async function submitForm() {
    const nome     = document.getElementById('nome').value.trim();
    const email    = document.getElementById('email').value.trim();
    const telefone = document.getElementById('telefone').value.trim();

    if (!nome || !email) {
      toast('Nome e e-mail são obrigatórios.', 'err');
      return;
    }

    const payload = { nome, email, telefone };
    const url     = editingId ? `${API}/users/${editingId}` : `${API}/users`;
    const method  = editingId ? 'PUT' : 'POST';

    try {
      const res  = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok) {
        toast(data.error || 'Erro ao salvar.', 'err');
        return;
      }

      toast(editingId ? 'Cliente atualizado!' : 'Cliente cadastrado!', 'ok');
      resetForm();
      loadUsers();
    } catch (e) {
      toast('Falha na requisição. Verifique o backend.', 'err');
      console.error(e);
    }
  }

  // ── Editar ──────────────────────────────────────────────────────────────
  function startEdit(id, nome, email, telefone) {
    editingId = id;
    document.getElementById('nome').value     = nome;
    document.getElementById('email').value    = email;
    document.getElementById('telefone').value = telefone;
    document.getElementById('form-title').textContent = 'Editar Cliente';
    document.getElementById('edit-badge').style.display = 'inline';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Excluir ─────────────────────────────────────────────────────────────
  async function deleteUser(id, nome) {
    if (!confirm(`Excluir o cliente "${nome}"?`)) return;

    try {
      const res = await fetch(`${API}/users/${id}`, { method: 'DELETE' });
      if (res.ok) {
        toast('Cliente removido.', 'ok');
        loadUsers();
      } else {
        const data = await res.json();
        toast(data.error || 'Erro ao excluir.', 'err');
      }
    } catch (e) {
      toast('Falha na requisição.', 'err');
    }
  }

  // ── Utils ────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return isNaN(d) ? iso : d.toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'short' });
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  loadUsers();
</script>
</body>
</html>
