<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Clientes</title>
  <style>
    /* Estilos seguindo o seu design original */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3250; --accent: #5b8dee; --text: #e8eaf6;
      --muted: #8a8fb8; --radius: 10px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 2rem 1rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 1.9rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.8rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; text-align: left; }
    th { padding: .65rem .9rem; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: .75rem .9rem; border-bottom: 1px solid var(--border); }
    tr:hover { background: var(--surface2); }
    .btn-voltar {
      display: inline-block; background: var(--surface2); color: var(--text);
      padding: 0.5rem 1rem; text-decoration: none; border-radius: 7px;
      border: 1px solid var(--border); margin-bottom: 1rem;
    }
    .btn-voltar:hover { background: var(--border); }
    .badge {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; font-size: .75rem; color: var(--muted); padding: .15rem .6rem;
    }
  </style>
</head>
<body>

<div class="container">
  <a href="/" class="btn-voltar">← Voltar para Cadastro</a>
  <header>
    <h1>Clientes <span>Cadastrados</span></h1>
  </header>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th>Data de Criação</th>
        </tr>
      </thead>
      <tbody id="tbody-clientes">
        <tr><td colspan="5" style="text-align:center; color: #8a8fb8; padding: 2rem;">Carregando dados da API...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // Faz a requisição para a sua API Python
  async function carregarClientes() {
    const tbody = document.getElementById('tbody-clientes');
    try {
      const resposta = await fetch('/api/users');
      const clientes = await resposta.json();

      if (clientes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Nenhum cliente encontrado.</td></tr>';
        return;
      }

      // Transforma o JSON em linhas de HTML
      tbody.innerHTML = clientes.map(c => `
        <tr>
          <td><span class="badge">${c.id}</span></td>
          <td>${c.nome}</td>
          <td>${c.email}</td>
          <td>${c.telefone || '—'}</td>
          <td>${new Date(c.criado_em).toLocaleString('pt-BR')}</td>
        </tr>
      `).join('');

    } catch (erro) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color: #e05b5b;">Erro ao conectar com a API.</td></tr>';
      console.error(erro);
    }
  }

  // Executa a função assim que a página abre
  carregarClientes();
</script>
</body>
</html>
